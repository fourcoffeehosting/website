<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Four Coffee - Coming Soon</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4e3629; /* Deep coffee brown */
            --secondary: #c7a17a; /* Warm caramel */
            --dark: #1b120c; /* Espresso black */
            --light: #fdfaf6; /* Cream white */
            --gray: #8d7b70; /* Soft warm gray */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle background coffee pattern or overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(78,54,41,0.3) 0%, rgba(27,18,12,0.9) 100%);
            z-index: 1;
        }

        /* Floating decorative elements */
        .decor {
            position: absolute;
            font-size: 2rem;
            opacity: 0.15;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }
        .decor-1 { top: 10%; left: 10%; animation-delay: 0s; }
        .decor-2 { top: 20%; right: 15%; animation-delay: 2s; }
        .decor-3 { bottom: 15%; left: 20%; animation-delay: 4s; }
        .decor-4 { bottom: 25%; right: 10%; animation-delay: 6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 650px;
            text-align: center;
            padding: 40px 30px;
            background: rgba(27, 18, 12, 0.75);
            border: 1px solid rgba(199, 161, 122, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Logo Area */
        .logo-container {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Interactive Circular Badge for your Vector Logo */
        .logo-badge {
            background-color: #fdfaf6; /* Cream white background to match your logo */
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            animation: steam 3s ease-in-out infinite;
        }

        @keyframes steam {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        .logo-text-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--secondary);
            text-transform: uppercase;
            margin-top: 15px;
        }

        /* Heading & Intro */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 500;
            line-height: 1.3;
        }
        p.tagline {
            font-size: 0.95rem;
            color: var(--gray);
            margin-bottom: 35px;
            line-height: 1.6;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Countdown Timer */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .time-box {
            background: rgba(78, 54, 41, 0.4);
            border: 1px solid rgba(199, 161, 122, 0.15);
            border-radius: 12px;
            width: 85px;
            padding: 15px 5px;
            transition: transform 0.3s ease;
        }
        .time-box:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
        }
        .time-num {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--secondary);
            display: block;
        }
        .time-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray);
            margin-top: 5px;
            display: block;
        }

        /* Social Icons */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social-link {
            color: var(--secondary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: color 0.3s ease;
            border: 1px solid rgba(199, 161, 122, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(199, 161, 122, 0.05);
        }
        .social-link:hover {
            color: var(--light);
            background: var(--secondary);
            border-color: var(--secondary);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 30px 15px;
                width: 95%;
            }
            .logo-text-title { font-size: 1.8rem; }
            .logo-badge { width: 120px; height: 120px; }
            h1 { font-size: 1.5rem; }
            .countdown { gap: 8px; }
            .time-box { width: 70px; padding: 12px 2px; }
            .time-num { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <!-- Floating Decor Elements -->
    <div class="decor decor-1">☕</div>
    <div class="decor decor-2">✨</div>
    <div class="decor decor-3">☕</div>
    <div class="decor decor-4">🍂</div>

    <div class="container">
        <!-- Logo Container with Inline SVG Logo -->
        <div class="logo-container">
            <div class="logo-badge">
                <!-- Self-contained, perfectly rendered vector version of your brand logo -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100" height="100">
                    <style>
                        .brand-text {
                            font-family: 'Playfair Display', 'Georgia', serif;
                            font-weight: 900;
                            fill: #963E2B; /* Exact brand rust-brown color */
                        }
                        .brand-star {
                            fill: #963E2B;
                        }
                    </style>
                    <!-- Logo letters -->
                    <text x="55" y="65" font-size="38" text-anchor="middle" class="brand-text">F</text>
                    <text x="145" y="65" font-size="38" text-anchor="middle" class="brand-text">O</text>
                    <text x="55" y="140" font-size="38" text-anchor="middle" class="brand-text">U</text>
                    <text x="145" y="140" font-size="38" text-anchor="middle" class="brand-text">R</text>
                    
                    <!-- Exact 4-pointed star shape -->
                    <path d="M 100 52 Q 100 102 138 102 Q 100 102 100 152 Q 100 102 62 102 Q 100 102 100 52 Z" class="brand-star" />
                    
                    <!-- COFFEE label -->
                    <text x="100" y="182" font-size="23" text-anchor="middle" letter-spacing="1" class="brand-text">COFFEE</text>
                </svg>
            </div>
            <div class="logo-text-title">Four Coffee</div>
        </div>

        <!-- Heading -->
        <h1>We Are Coming Soon!</h1>
        <p class="tagline">A new coffee journey is about to begin. We are bringing you the finest coffee beans and an unforgettable taste experience. Stay tuned!</p>

        <!-- Countdown Timer -->
        <div class="countdown" id="countdown">
            <div class="time-box">
                <span class="time-num" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-box">
                <span class="time-num" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-box">
                <span class="time-num" id="minutes">00</span>
                <span class="time-label">Minutes</span>
            </div>
            <div class="time-box">
                <span class="time-num" id="seconds">00</span>
                <span class="time-label">Seconds</span>
            </div>
        </div>

        <!-- Social Media Links -->
        <div class="social-links">
            <a href="https://www.instagram.com/fourcoffee.india/" target="_blank" class="social-link">Instagram</a>
        </div>
    </div>

    <script>
        // --- Countdown Timer Logic ---
        // Set target date to 30 days from now 
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 30); 

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                document.getElementById('countdown').innerHTML = "<p style='font-size: 1.2rem; color: var(--secondary); font-weight: 600;'>We are officially open!</p>";
                clearInterval(countdownInterval);
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Format numbers to always show two digits
            document.getElementById('days').innerText = String(days).padStart(2, '0');
            document.getElementById('hours').innerText = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
        }

        // Run once immediately, then update every second
        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
